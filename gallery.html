<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Gallery | Faiz Ibn-e-Tanveer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-page{padding:120px 0 80px}
        .gallery-page-header{text-align:center;margin-bottom:48px}
        .gallery-page-header .label{margin-bottom:4px}
        .gallery-masonry{columns:3;column-gap:14px}
        .gallery-masonry a{display:block;margin-bottom:14px;break-inside:avoid;border-radius:4px;overflow:hidden;position:relative}
        .gallery-masonry img{width:100%;display:block;transition:transform .5s}
        .gallery-masonry a:hover img{transform:scale(1.04)}
        .gallery-masonry a::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s}
        .gallery-masonry a:hover::after{background:rgba(0,0,0,.25)}
        .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--gold);font-size:12px;letter-spacing:1.5px;font-weight:500;margin-bottom:20px;transition:opacity .3s}
        .back-link:hover{opacity:.7}
        @media(max-width:768px){.gallery-masonry{columns:2}}
        @media(max-width:480px){.gallery-masonry{columns:1}}
    </style>
</head>
<body>
    <nav class="navbar scrolled">

            </a>
            <div class="gallery-page-header">
